services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: switchboard
      POSTGRES_PASSWORD: switchboard
      POSTGRES_DB: switchboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_v17:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U switchboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_v17:
  redis_data:
