# Azure DevOps Server (on-prem) CI/CD → private Harbor
#
# Runs on the Default self-hosted agent pool (not Microsoft-hosted).
#
# Agent prerequisites (Default pool):
#   - Docker Engine + permission for the agent user to run docker
#   Go/Node are NOT required on the agent — tests run inside containers.
#   Container jobs copy/read-only mount sources so they do not leave root-owned
#   node_modules/.pnpm on the agent (which breaks the next checkout clean).
#
# Setup:
# 1. Pipelines → Library → Variable group "HARBOR" with:
#      HARBOR_HOST      — e.g. https://harbor.example.com (https:// is stripped for image tags)
#      HARBOR_USER      — robot or user with push
#      HARBOR_PASSWORD  — secret (lock the variable)
# 2. Authorize the variable group for this pipeline
# 3. Harbor project + robot with push; set HARBOR_PROJECT / IMAGE_NAME below
# 4. Optional deploy: variable group switchboard-deploy (DEPLOY_PATH) + SSH switchboard-ssh

trigger:
  branches:
    include:
      - main
      - master
  paths:
    exclude:
      - docs/**
      - "**/*.md"

pr:
  branches:
    include:
      - main
      - master

pool:
  name: Default

variables:
  - group: HARBOR
  - name: HARBOR_PROJECT
    value: ${HARBOR_PROJECT}
  - name: IMAGE_NAME
    value: switchboard
  - name: dockerfilePath
    value: $(Build.SourcesDirectory)/Dockerfile
  - name: enableRemoteDeploy
    value: "false"
  - name: goImage
    value: golang:1.25-alpine
  - name: nodeImage
    value: node:20-alpine

stages:
  - stage: Test
    displayName: Test
    jobs:
      - job: BackendTest
        displayName: Backend unit tests (Docker)
        steps:
          # clean:false — prior runs may have left root-owned files the agent cannot delete
          - checkout: self
            clean: false

          - script: |
              set -euo pipefail
              docker run --rm -v "$(Build.SourcesDirectory):/work" alpine:3.20 \
                sh -c 'rm -rf /work/frontend/node_modules /work/frontend/.pnpm /work/frontend/.pnpm-store /work/.pnpm-store'
            displayName: Remove root-owned leftover artifacts

          - script: |
              set -euo pipefail
              # Read-only mount + caches in /tmp so the agent workspace stays clean
              docker run --rm \
                -e GOCACHE=/tmp/go-cache \
                -e GOMODCACHE=/tmp/go-mod \
                -v "$(Build.SourcesDirectory)/backend:/app:ro" \
                -w /app \
                "$(goImage)" \
                go test ./...
            displayName: go test in container

      - job: FrontendBuild
        displayName: Frontend build (Docker)
        steps:
          - checkout: self
            clean: false

          - script: |
              set -euo pipefail
              docker run --rm -v "$(Build.SourcesDirectory):/work" alpine:3.20 \
                sh -c 'rm -rf /work/frontend/node_modules /work/frontend/.pnpm /work/frontend/.pnpm-store /work/.pnpm-store'
            displayName: Remove root-owned leftover artifacts

          - script: |
              set -euo pipefail
              # Copy sources into the container — never write node_modules onto the agent
              docker run --rm \
                -v "$(Build.SourcesDirectory)/frontend:/src:ro" \
                -w /tmp/frontend \
                "$(nodeImage)" \
                sh -c 'cp -a /src/. /tmp/frontend/ && corepack enable && corepack prepare pnpm@10 --activate && pnpm install --frozen-lockfile && pnpm exec vite build --outDir /tmp/dist --emptyOutDir'
            displayName: pnpm build in container

  - stage: Build
    displayName: Build and push to Harbor
    dependsOn: Test
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: DockerBuild
        displayName: Docker build and push to Harbor
        steps:
          - checkout: self
            clean: false

          - script: |
              set -euo pipefail
              docker run --rm -v "$(Build.SourcesDirectory):/work" alpine:3.20 \
                sh -c 'rm -rf /work/frontend/node_modules /work/frontend/.pnpm /work/frontend/.pnpm-store /work/.pnpm-store'
            displayName: Remove root-owned leftover artifacts

          - script: |
              set -euxo pipefail
              SOURCE_BRANCH=$(Build.SourceBranch)
              BRANCH_NAME=${SOURCE_BRANCH#refs/heads/}
              SAFE_BRANCH=$(echo "$BRANCH_NAME" | tr '/' '-')
              HARBOR_REPO="${HARBOR_HOST#https://}/$(HARBOR_PROJECT)/$(IMAGE_NAME)"

              echo "$HARBOR_PASSWORD" | docker login "$HARBOR_HOST" \
                -u "$HARBOR_USER" --password-stdin
              docker build -t "${HARBOR_REPO}:${SAFE_BRANCH}-$(Build.BuildId)" \
                -t "${HARBOR_REPO}:${SAFE_BRANCH}-latest" \
                -f "$(dockerfilePath)" "$(Build.SourcesDirectory)"
              docker push "${HARBOR_REPO}:${SAFE_BRANCH}-$(Build.BuildId)"
              docker push "${HARBOR_REPO}:${SAFE_BRANCH}-latest"
              docker logout "$HARBOR_HOST"
              echo "##vso[task.setvariable variable=fullImage;isOutput=true]${HARBOR_REPO}:${SAFE_BRANCH}-$(Build.BuildId)"
            name: imageMeta
            displayName: Push to Harbor Registry
            env:
              HARBOR_HOST: $(HARBOR_HOST)
              HARBOR_USER: $(HARBOR_USER)
              HARBOR_PASSWORD: $(HARBOR_PASSWORD)

