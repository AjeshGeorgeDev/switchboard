# Azure DevOps Server (on-prem) CI/CD → private Harbor
#
# Runs on the Default self-hosted agent pool (not Microsoft-hosted).
#
# Agent prerequisites (Default pool):
#   - Docker Engine + permission for the agent user to run docker
#   Go/Node are NOT required on the agent — tests run inside containers.
#
# Setup:
# 1. Pipelines → Library → Variable group "HARBOR" with:
#      HARBORHOST       — hostname only, e.g. harbor.example.com (no https://)
#      HARBOR_USERNAME  — robot or user with push
#      HARBOR_PASSWORD  — secret (lock the variable)
# 2. Authorize the variable group for this pipeline
# 3. Harbor project + robot with push; set imageRepository to project/repo
# 4. Optional deploy: variable group switchboard-deploy (DEPLOY_PATH) + SSH switchboard-ssh

trigger:
  branches:
    include:
      - main
      - master
  paths:
    exclude:
      - docs/**
      - "**/*.md"

pr:
  branches:
    include:
      - main
      - master

pool:
  name: Default

variables:
  - group: HARBOR
  - name: imageRepository
    value: switchboard/switchboard
  - name: dockerfilePath
    value: $(Build.SourcesDirectory)/Dockerfile
  - name: imageTag
    value: $(Build.BuildId)
  - name: enableRemoteDeploy
    value: "false"
  - name: goImage
    value: golang:1.25-alpine
  - name: nodeImage
    value: node:20-alpine

stages:
  - stage: Test
    displayName: Test
    jobs:
      - job: BackendTest
        displayName: Backend unit tests (Docker)
        steps:
          - script: |
              set -euo pipefail
              docker run --rm \
                -v "$(Build.SourcesDirectory)/backend:/app" \
                -w /app \
                "$(goImage)" \
                go test ./...
            displayName: go test in container

      - job: FrontendBuild
        displayName: Frontend build (Docker)
        steps:
          - script: |
              set -euo pipefail
              docker run --rm \
                -v "$(Build.SourcesDirectory)/frontend:/app" \
                -w /app \
                "$(nodeImage)" \
                sh -c 'corepack enable && corepack prepare pnpm@10 --activate && pnpm install --frozen-lockfile && pnpm run build'
            displayName: pnpm build in container

  - stage: Build
    displayName: Build and push to Harbor
    dependsOn: Test
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: DockerBuild
        displayName: Docker build and push to Harbor
        steps:
          - script: |
              set -euo pipefail
              IMAGE="$(HARBORHOST)/$(imageRepository)"
              echo "$(HARBOR_PASSWORD)" | docker login "$(HARBORHOST)" -u "$(HARBOR_USERNAME)" --password-stdin
              docker build -t "${IMAGE}:$(imageTag)" -t "${IMAGE}:latest" -f "$(dockerfilePath)" "$(Build.SourcesDirectory)"
              docker push "${IMAGE}:$(imageTag)"
              docker push "${IMAGE}:latest"
              echo "##vso[task.setvariable variable=fullImage;isOutput=true]${IMAGE}:$(imageTag)"
            name: imageMeta
            displayName: Login, build, and push to Harbor

